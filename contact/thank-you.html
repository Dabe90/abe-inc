<!DOCTYPE html>

<head>

  <meta name="robots" content="noindex" />

<body class="min-h-screen bg-white text-ink antialiased flex flex-col">
  <header class="site-header sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center gap-2.5"><span class="site-logo-mark">A</span><span class="font-semibold">Abe Stack</span></a>

    </div>

  <footer class="site-footer mt-auto"><div class="max-w-6xl mx-auto px-4 py-8 text-center text-sm text-slate-500">© <span data-year></span> Abe Stack</div></footer>
